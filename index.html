<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际社交巡逻队 - 空间站内部避障版</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; user-select: none; }
        #game-container { width: 100vw; height: 100vh; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 8px; pointer-events: none;
        }
        h3 { margin: 0 0 10px 0; color: #00ffcc; }
        
        #camera-toggle-btn {
            position: absolute; bottom: 30px; right: 30px;
            padding: 15px 30px; font-size: 18px; font-weight: bold; color: #00ffcc;
            background: rgba(10, 25, 50, 0.8); border: 2px solid #00ffcc; border-radius: 30px;
            cursor: pointer; box-shadow: 0 0 15px rgba(0,255,204,0.3); z-index: 100;
        }
        #camera-toggle-btn:hover { background: #00ffcc; color: #0a1932; }

        /* 相机全息取景框 */
        #viewfinder-ui {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; display: none; box-sizing: border-box; border: 20px solid rgba(0, 0, 0, 0.4);
        }
        .corner { position: absolute; width: 40px; height: 40px; border: 4px solid #00ffcc; }
        .tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        
        .rec-indicator { position: absolute; top: 40px; left: 50px; color: #ff3333; font-size: 20px; font-weight: bold; display: flex; align-items: center; }
        .rec-dot { width: 14px; height: 14px; background: #ff3333; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        
        .crosshair { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); border: 2px solid #00ffcc; border-radius: 50%; }
        .crosshair::before { content: ''; position: absolute; top: 14px; left: -5px; width: 40px; height: 2px; background: #00ffcc; }
        .crosshair::after { content: ''; position: absolute; left: 14px; top: -5px; height: 40px; width: 2px; background: #00ffcc; }

        #alert-banner {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: rgba(255, 0, 50, 0.85); color: white; padding: 12px 40px;
            font-size: 22px; font-weight: bold; border-radius: 5px; border: 2px solid #ffffff;
            box-shadow: 0 0 20px #ff0032; display: none;
        }

        #record-action-btn {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; font-size: 20px; font-weight: bold; color: white;
            background: #ff3333; border: none; border-radius: 10px; cursor: pointer;
            box-shadow: 0 0 20px rgba(255,51,51,0.5); display: none; pointer-events: auto;
        }

        #dialogue-bubble {
            position: absolute; top: 65%; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: #ff3333; border: 2px solid #ff3333;
            padding: 15px 30px; font-size: 24px; font-weight: bold; border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,0,0,0.4); display: none; text-align: center; z-index: 90;
        }

        /* 修复与社交实践小游戏 UI */
        #practice-game-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 550px; background: rgba(15, 25, 50, 0.95); border: 3px solid #00ffcc;
            border-radius: 20px; padding: 30px; color: white; display: none;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4); z-index: 200;
        }
        .game-title { text-align: center; color: #00ffcc; margin-top: 0; font-size: 24px; letter-spacing: 1px; }
        .game-desc { font-size: 16px; color: #a0aec0; margin-bottom: 25px; text-align: center; }
        
        .distance-slider-container { width: 100%; height: 40px; background: #2d3748; border-radius: 20px; position: relative; margin-bottom: 25px; overflow: hidden; }
        .safe-zone { position: absolute; left: 40%; width: 25%; height: 100%; background: #48bb78; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .safe-label { position: absolute; left: 40%; width: 25%; text-align: center; line-height: 40px; font-size: 12px; font-weight: bold; color: white; z-index: 5; pointer-events: none; }
        .distance-indicator { position: absolute; left: 10%; width: 16px; height: 100%; background: #ff3333; transition: left 0.1s; box-shadow: 0 0 10px #ff3333; }
        
        #quiz-section { display: none; border-top: 1px solid #4a5568; padding-top: 20px; }
        .quiz-bubble { background: #2d3748; padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 18px; border-left: 5px solid #ffcc00; }
        .quiz-option { width: 100%; padding: 12px; background: #3182ce; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; margin-bottom: 10px; cursor: pointer; text-align: left; transition: background 0.2s; }
        .quiz-option:hover { background: #2b6cb0; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <h3>星际社交巡逻队 v3.6</h3>
        <p id="move-tip">移动：W, A, S, D | 跳跃：空格键</p>
        <p>【空间站内部净化成功】：隐形空气墙机制已启动，所有机器人与视角绝不出界！</p>
    </div>

    <button id="camera-toggle-btn" onclick="toggleCameraMode()">📸 开启巡逻相机</button>

    <div id="viewfinder-ui">
        <div class="corner tl"></div><div class="corner tr"></div>
        <div class="corner bl"></div><div class="corner br"></div>
        <div class="rec-indicator"><div class="rec-dot"></div>● REC</div>
        <div class="crosshair"></div>
        <div id="alert-banner">[ ! ] WARNING: GLITCH DETECTED</div>
        
        <button id="record-action-btn" onclick="startGlitchRecording()">📹 录制故障行为</button>
    </div>

    <div id="dialogue-bubble">🤖 ERROR!! “我今天买了个新飞船！？”</div>

    <div id="practice-game-ui">
        <h2 class="game-title">🛠️ 芯片修复：安全距离测算</h2>
        <p class="game-desc">请使用键盘的左右方向键（← / →）操作机器人的推进器，使其停留在绿色安全社交距离区内。</p>
        
        <div class="distance-slider-container">
            <div class="safe-zone"></div>
            <div class="safe-label">安全距离 (1-1.5米)</div>
            <div id="distance-pointer" class="distance-indicator"></div>
        </div>

        <div id="quiz-section">
            <h2 class="game-title" style="color: #ffcc00;">💬 社交雷达：倾听与同步</h2>
            <div class="quiz-bubble">正常聊天的机器人小组正在热烈地讨论：<br><strong>“昨晚那场太空棒球比赛太精彩了！”</strong></div>
            <button class="quiz-option" onclick="handleQuizAnswer(false)">A. 我今天买了个新飞船！</button>
            <button class="quiz-option" onclick="handleQuizAnswer(true)">B. 你们也喜欢看昨晚的彗星杯比赛吗？</button>
            <button class="quiz-option" onclick="handleQuizAnswer(false)">C. 闪开，别挡着我的道！</button>
        </div>
    </div>

    <script>
        const SCENE_Y_OFFSET = 0; 

        // ==========================================
        // 🛠️【空气墙核心中枢】：控制室内可活动的最大圆形半径
        // ==========================================
        const INNER_WALL_RADIUS = 9.0; // 空间站内部圆形甲板的最大走动半径。如果撞墙可以根据场景大小改动它

        const MODEL_CONFIG = {
            ground: 'scene.gltf',                         
            playerIdle: 'Idle.glb',                  
            playerWalk: 'Walking.glb',                    
            robot:  'robot_walk_animation.glb'            
        };

        let scene, camera, renderer, controls;
        let environmentMesh; 
        let player, playerIdleMesh, playerWalkMesh; 
        let glitchRobot, chatGroup; 
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = true;
        let playerVelocity = new THREE.Vector3();
        const PLAYER_SPEED = 14.0; const JUMP_FORCE = 10.0; const GRAVITY = 28.0; 
        let clock = new THREE.Clock();
        const loader = new THREE.GLTFLoader();

        let idleMixer, walkMixer; 
        let currentActionState = "idle"; 
        let robotMixers = [];     

        let isCameraMode = false; let isRecordingSequence = false; 
        let recordingTimer = 0; let animationStage = 0; 
        
        let raycaster = new THREE.Raycaster(); let mouse = new THREE.Vector2(0, 0);   
        let cameraObstacleRaycaster = new THREE.Raycaster(); 

        let mockDistancePercent = 10; let isPracticeGameActive = false;

        // 🌟【1. 全局配置与初始化】：设定小男孩最合适的整体比例为 1
        const PLAYER_SCALE = 1.0; 

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510); 
            scene.fog = new THREE.FogExp2(0x050510, 0.002); 

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
            
            // 设定初始斜上方坐标，配合后面写死的偏移量
            camera.position.set(0, 4.5, 5.0); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.outputEncoding = THREE.sRGBEncoding; 
            document.getElementById('game-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; controls.dampingFactor = 0.05;
            
            // 限制俯仰角度，避免用户转鼠标时把视角拉平
            controls.minPolarAngle = Math.PI / 4;   // 最高俯视约 45 度
            controls.maxPolarAngle = Math.PI / 3;   // 最低仰视约 60 度

            controls.minDistance = 1.0;
            controls.maxDistance = 10.0;

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.8); scene.add(ambientLight);
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444466, 1.5); hemiLight.position.set(0, 100, 0); scene.add(hemiLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1.0); dirLight.position.set(50, 150, 50); scene.add(dirLight);

            // 1. 加载太空大地图
            loader.load(MODEL_CONFIG.ground, function (gltf) { 
                environmentMesh = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(environmentMesh);
                const center = box.getCenter(new THREE.Vector3());
                environmentMesh.position.x -= center.x;
                environmentMesh.position.z -= center.z;
                environmentMesh.position.y = SCENE_Y_OFFSET; 
                
                scene.add(environmentMesh); 
            });

            // 2. 主角加载
            player = new THREE.Group();
            player.position.set(0, 0, 0); 
            scene.add(player);
            
            loader.load(MODEL_CONFIG.playerIdle, function (gltf) {
                playerIdleMesh = gltf.scene;
                playerIdleMesh.scale.set(PLAYER_SCALE, PLAYER_SCALE, PLAYER_SCALE); 
                playerIdleMesh.position.set(0, 0, 0);
                player.add(playerIdleMesh);

                if (gltf.animations && gltf.animations.length > 0) {
                    idleMixer = new THREE.AnimationMixer(playerIdleMesh);
                    idleMixer.clipAction(gltf.animations[0]).play();
                }
            });

            loader.load(MODEL_CONFIG.playerWalk, function (gltf) {
                playerWalkMesh = gltf.scene;
                playerWalkMesh.scale.set(PLAYER_SCALE, PLAYER_SCALE, PLAYER_SCALE); 
                playerWalkMesh.position.set(0, 0, 0);
                playerWalkMesh.visible = false; 
                player.add(playerWalkMesh);

                if (gltf.animations && gltf.animations.length > 0) {
                    walkMixer = new THREE.AnimationMixer(playerWalkMesh);
                    walkMixer.clipAction(gltf.animations[0]).play();
                }
            });

            controls.target.copy(player.position);

            // 3. 关卡收拢NPC居民
            chatGroup = new THREE.Group(); 
            chatGroup.position.set(-3, 0, -3); 
            scene.add(chatGroup);
            loadNPC(MODEL_CONFIG.robot, {x: 0, y: 0, z: 0}, 0xffcc00, chatGroup);
            loadNPC(MODEL_CONFIG.robot, {x: -1.5, y: 0, z: 1.5}, 0xffcc00, chatGroup);

            for(let i=0; i<2; i++) {
                let angle = Math.random() * Math.PI * 2;
                let radius = Math.random() * 5.0;
                loadNPC(MODEL_CONFIG.robot, {x: Math.cos(angle)*radius, y: 0, z: Math.sin(angle)*radius}, 0x33ff33, scene);
            }

            // 4. 加载故障红色机器人
            glitchRobot = new THREE.Group(); 
            glitchRobot.position.set(4, 0, -2); 
            scene.add(glitchRobot);
            loadGlitchNPC(MODEL_CONFIG.robot, glitchRobot);

            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            window.addEventListener('resize', onWindowResize);
        }

        function updatePlayerActionState() {
            if (isCameraMode) return;
            if (!playerIdleMesh || !playerWalkMesh) return;

            const isMoving = moveForward || moveBackward || moveLeft || moveRight;

            if (isMoving && currentActionState === "idle") {
                playerIdleMesh.visible = false;  
                playerWalkMesh.visible = true;   
                currentActionState = "walk";
            } 
            else if (!isMoving && currentActionState === "walk") {
                playerIdleMesh.visible = true;   
                playerWalkMesh.visible = false;  
                currentActionState = "idle";
            }
        }

        // 🌟【4. 退出巡逻相机模式的恢复】：回归时靶心与相机偏移同步到斜上方
        function toggleCameraMode() {
            if(isRecordingSequence || isPracticeGameActive) return;
            isCameraMode = !isCameraMode;
            const btn = document.getElementById('camera-toggle-btn');
            const viewfinder = document.getElementById('viewfinder-ui');

            if (isCameraMode) {
                btn.innerText = "❌ 退出拍照模式"; viewfinder.style.display = 'block';
                
                if (playerIdleMesh) playerIdleMesh.visible = false;
                if (playerWalkMesh) playerWalkMesh.visible = false;

                controls.minDistance = 0.1; controls.maxDistance = 5;
                camera.position.set(player.position.x, player.position.y + 2.4, player.position.z);
                const forwardDir = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
                controls.target.copy(camera.position).add(forwardDir.multiplyScalar(0.5));
            } else {
                btn.innerText = "📸 开启巡逻相机"; viewfinder.style.display = 'none';
                document.getElementById('alert-banner').style.display = 'none';
                document.getElementById('record-action-btn').style.display = 'none';
                
                currentActionState = "idle"; 
                if (playerIdleMesh) playerIdleMesh.visible = true;
                if (playerWalkMesh) playerWalkMesh.visible = false;

                controls.minDistance = 1.0; controls.maxDistance = 10.0;
                
                // 🌟 同步斜上方回归，卡死高位跟随机位
                controls.target.copy(player.position).y += 0.95;
                camera.position.set(player.position.x, player.position.y + 4.5, player.position.z + 5.0);
            }
        }

        function startGlitchRecording() {
            isRecordingSequence = true; animationStage = 1; recordingTimer = 0;
            document.getElementById('record-action-btn').style.display = 'none';
            document.getElementById('alert-banner').innerText = "⚠️ RECORDING... COGNITIVE ANALYSIS ACTIVATED";
        }

        function enterPracticePhase() {
            isPracticeGameActive = true; mockDistancePercent = 10;
            document.getElementById('distance-pointer').style.left = mockDistancePercent + '%';
            document.getElementById('practice-game-ui').style.display = 'block';
            document.getElementById('quiz-section').style.display = 'none';
        }

        function handleQuizAnswer(isCorrect) {
            if(isCorrect) {
                alert("✨【同步成功】！机器人学习了正确的切入话题方式，社交经验 +100！");
                document.getElementById('practice-game-ui').style.display = 'none';
                isPracticeGameActive = false;
                glitchRobot.traverse(child => { if(child.isMesh && child.material) child.material.emissive.setHex(0x000000); });
                const core = glitchRobot.getObjectByName("glitchCore"); if(core) glitchRobot.remove(core);
                glitchRobot.position.set(-3, 0, -4.5); 
            } else {
                alert("❌ 话题不同步！机器人的社交芯片产生了尴尬情绪，请重新阅读倾听内容并做出选择。");
            }
        }

        function loadNPC(modelUrl, pos, backupColor, parentNode) {
            const group = new THREE.Group(); group.position.set(pos.x, pos.y, pos.z); parentNode.add(group);
            loader.load(modelUrl, function(gltf) { 
                const mesh = gltf.scene; mesh.scale.set(1.3, 1.3, 1.3); group.add(mesh); 
                if(gltf.animations && gltf.animations.length > 0){
                    const mixer = new THREE.AnimationMixer(mesh); mixer.clipAction(gltf.animations[0]).play(); robotMixers.push(mixer);
                }
            }, undefined, function(err) {
                const box = new THREE.Mesh(new THREE.BoxGeometry(2.1, 4.2, 2.1), new THREE.MeshStandardMaterial({ color: backupColor })); box.position.y = 2.1; group.add(box);
            });
        }

        // 🌟【2. 机器人加载函数修改】：压低红色核心和判定检测体位置
        function loadGlitchNPC(modelUrl, targetGroup) {
            loader.load(modelUrl, function(gltf) {
                const mesh = gltf.scene; mesh.scale.set(1.3, 1.3, 1.3); targetGroup.add(mesh);
                mesh.traverse(child => {
                    if(child.isMesh && child.material) {
                        child.material = child.material.clone(); child.material.emissive = new THREE.Color(0xff0000); child.material.emissiveIntensity = 0.5;
                    }
                });
                if(gltf.animations && gltf.animations.length > 0){
                    const mixer = new THREE.AnimationMixer(mesh); mixer.clipAction(gltf.animations[0]).play(); robotMixers.push(mixer);
                }
            }, undefined, function(err) {
                const box = new THREE.Mesh(new THREE.BoxGeometry(2.1, 4.2, 2.1), new THREE.MeshStandardMaterial({ color: 0xff3333 })); box.position.y = 2.1; targetGroup.add(box);
            });

            // 缩减检测盒高度（从 5.6 降到 2.6）
            const hitbox = new THREE.Mesh(new THREE.BoxGeometry(3.5, 2.6, 3.5), new THREE.MeshBasicMaterial({ visible: false })); hitbox.position.y = 1.3; hitbox.name = "Glitch_Target"; targetGroup.add(hitbox);
            // 🌟【红色核心拉低】：挂载高度从原先的 6.0 降低到 2.6，完美贴合机器人头顶
            const core = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true })); core.position.y = 2.6; core.name = "glitchCore"; targetGroup.add(core);
        }

        function onKeyDown(event) {
            if (isPracticeGameActive && !isRecordingSequence) {
                if (event.code === 'ArrowLeft' || event.code === 'KeyA') mockDistancePercent = Math.max(0, mockDistancePercent - 2);
                if (event.code === 'ArrowRight' || event.code === 'KeyD') mockDistancePercent = Math.min(95, mockDistancePercent + 2);
                document.getElementById('distance-pointer').style.left = mockDistancePercent + '%';
                if (mockDistancePercent >= 40 && mockDistancePercent <= 65) document.getElementById('quiz-section').style.display = 'block';
                return;
            }

            if (isCameraMode || isRecordingSequence) return; 
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) { playerVelocity.y = JUMP_FORCE; canJump = false; } break;
            }
            updatePlayerActionState(); 
        }

        function onKeyUp(event) {
            if (isPracticeGameActive) return;
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
            updatePlayerActionState(); 
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta(); const time = clock.getElapsedTime();

            if (idleMixer) idleMixer.update(delta);
            if (walkMixer) walkMixer.update(delta);
            robotMixers.forEach(mixer => mixer.update(delta));

            // 常规随视角方向移动
            if (!isCameraMode && !isRecordingSequence && !isPracticeGameActive && player) {
                playerVelocity.y -= GRAVITY * delta; 
                const direction = new THREE.Vector3(0, 0, 0);

                const camDirection = new THREE.Vector3();
                camera.getWorldDirection(camDirection);
                camDirection.y = 0; camDirection.normalize();

                const camRight = new THREE.Vector3();
                camRight.crossVectors(new THREE.Vector3(0, 1, 0), camDirection).normalize().negate();

                if (moveForward) direction.add(camDirection);
                if (moveBackward) direction.add(camDirection.clone().negate());
                if (moveLeft) direction.add(camRight.clone().negate());
                if (moveRight) direction.add(camRight);

                direction.normalize();

                player.position.addScaledVector(direction, PLAYER_SPEED * delta); 
                player.position.y += playerVelocity.y * delta;
                
                if (player.position.y < 0) { playerVelocity.y = 0; player.position.y = 0; canJump = true; }

                // 空气墙圆形区域边缘约束
                let pDist = Math.sqrt(player.position.x * player.position.x + player.position.z * player.position.z);
                if (pDist > INNER_WALL_RADIUS) {
                    player.position.setLength(INNER_WALL_RADIUS); 
                }

                if(direction.lengthSq() > 0) { player.rotation.y = Math.atan2(direction.x, direction.z); }

                // 🌟【3. 主循环中的镜头追随重构】：极其稳定的斜上方完美俯视视角追随
                if (!isCameraMode) {
                    // 1. 定义固定的斜上方相对偏移向量（X不偏移，Y高挂4.5，Z后退5.0提供更开阔的视野）
                    const fixedCamOffset = new THREE.Vector3(0, 4.5, 5.0); 

                    // 2. 让控制器的靶心对准小男孩的中心（高度根据比例 1 调回至 0.95 左右最舒适）
                    controls.target.copy(player.position);
                    controls.target.y += 0.95; 

                    // 3. 强制相机的坐标等于：小男孩当前位置 + 固定的斜上方偏移
                    camera.position.copy(player.position).add(fixedCamOffset);
                    
                    // 4. 防遮挡射线的起点也保持一致
                    const rayStart = new THREE.Vector3().copy(player.position).add(new THREE.Vector3(0, 0.95, 0));

                    // 室内短距避障优化
                    if (environmentMesh) {
                        const rayEnd = new THREE.Vector3().copy(camera.position);
                        const rayDir = new THREE.Vector3().subVectors(rayEnd, rayStart);
                        const idealDistance = rayDir.length();
                        rayDir.normalize();

                        cameraObstacleRaycaster.set(rayStart, rayDir);
                        const hits = cameraObstacleRaycaster.intersectObject(environmentMesh, true);

                        if (hits.length > 0 && hits[0].distance < idealDistance && hits[0].distance < 2.0) {
                            const safeDistance = Math.max(0.6, hits[0].distance - 0.2);
                            camera.position.copy(rayStart).addScaledVector(rayDir, safeDistance);
                        }
                    }
                }
            } 
            else if (isCameraMode && !isRecordingSequence && !isPracticeGameActive) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(scene.children, true);
                let foundGlitch = false;
                for (let i = 0; i < intersects.length; i++) {
                    if (intersects[i].object.name === "Glitch_Target") { foundGlitch = true; break; }
                }
                document.getElementById('alert-banner').style.display = foundGlitch ? 'block' : 'none';
                document.getElementById('record-action-btn').style.display = foundGlitch ? 'block' : 'none';
            }
            // 分镜收拢适配
            else if (isRecordingSequence) {
                recordingTimer += delta;
                if (animationStage === 1) {
                    controls.target.lerp(new THREE.Vector3(-3, 1.5, -3), 0.05);
                    camera.position.lerp(new THREE.Vector3(-0.5, 3.2, 0), 0.05);
                    if (recordingTimer > 1.5) { animationStage = 2; }
                }
                else if (animationStage === 2) {
                    glitchRobot.position.lerp(new THREE.Vector3(-1.2, 0, -3), 0.1); 
                    glitchRobot.rotation.y = Math.sin(time * 40) * 0.3; 
                    document.getElementById('dialogue-bubble').style.display = 'block';

                    if (recordingTimer > 4.0) {
                        isRecordingSequence = false; animationStage = 0;
                        document.getElementById('dialogue-bubble').style.display = 'none';
                        toggleCameraMode(); 
                        enterPracticePhase(); 
                    }
                }
            }

            if (glitchRobot && !isRecordingSequence) {
                const core = glitchRobot.getObjectByName("glitchCore");
                if (core) { core.rotation.x += 4 * delta; core.rotation.y += 4 * delta; core.visible = Math.sin(time * 20) > 0; }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
